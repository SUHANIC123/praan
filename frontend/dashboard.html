<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pran — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/pran.css" />
  <style>
    .dash-wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .dash-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .dash-head h1 { font-size: 24px; font-weight: 800; }
    .dash-head p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-box {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 20px; box-shadow: var(--shadow-sm);
    }
    .stat-box .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .stat-box .value { font-size: 28px; font-weight: 800; color: var(--red); margin-top: 6px; }
    .stat-box .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .quick-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .quick-links a {
      padding: 10px 18px; border-radius: var(--radius-pill); background: var(--white);
      border: 1.5px solid var(--border); font-weight: 600; font-size: 13px; color: var(--text-primary); text-decoration: none;
    }
    .quick-links a:hover { border-color: var(--red); color: var(--red); }
    .btn-outline { border: 1.5px solid var(--border); background: var(--white); padding: 10px 18px; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn-outline:hover { border-color: var(--text-secondary); }
  </style>
</head>
<body>
  <nav class="navbar navbar-minimal">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">✚</div>
      Pran
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="track.html" id="nav-track-dash">Track</a></li>
    </ul>
    <div class="nav-user">
      <span data-nav-username>—</span>
      <button type="button" class="btn-outline" id="btnLogout" style="margin-left:12px">Logout</button>
    </div>
  </nav>

  <div class="dash-wrap">
    <div class="dash-head">
      <div>
        <h1 id="dashGreeting">Your dashboard</h1>
        <p id="dashSub">Overview of your emergency rides and spending.</p>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div class="label">Total rides</div>
        <div class="value" id="statRides">—</div>
        <div class="sub">Completed and in progress</div>
      </div>
      <div class="stat-box">
        <div class="label">Total billed</div>
        <div class="value" id="statSpend">—</div>
        <div class="sub">Sum of completed trip totals</div>
      </div>
      <div class="stat-box">
        <div class="label">Account</div>
        <div class="value" style="font-size:16px;font-weight:700;color:var(--text-primary)" id="statPhone">—</div>
        <div class="sub">Registered phone</div>
      </div>
    </div>

    <p class="section-title">Quick actions</p>
    <div class="quick-links">
      <a href="index.html">Request ambulance</a>
      <a href="history.html">View full history &amp; transactions</a>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
