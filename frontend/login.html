<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pran — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/pran.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--card); border-radius: var(--radius-xl);
      padding: 32px; box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .auth-card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; color: var(--text-primary); }
    .auth-card .sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tabs button {
      flex: 1; padding: 10px; border-radius: var(--radius-md);
      border: 1.5px solid var(--border); background: var(--white);
      font-weight: 700; font-size: 13px; cursor: pointer; color: var(--text-secondary);
    }
    .auth-tabs button.active { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-label); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 14px; border-radius: var(--radius-md);
      border: 1.5px solid var(--border); font-size: 14px; font-family: inherit;
    }
    .form-group input:focus { outline: none; border-color: var(--red); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .hint { font-size: 12px; color: var(--text-muted); margin-top: 16px; line-height: 1.5; }
    .back-link { display: inline-block; margin-top: 20px; font-size: 14px; font-weight: 600; color: var(--red); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your Pran account to track rides and billing history.</p>

      <div class="auth-tabs">
        <button type="button" class="active" id="tabLogin" data-tab="login">Login</button>
        <button type="button" id="tabRegister" data-tab="register">Register</button>
      </div>

      <div id="panelLogin" class="auth-panel active">
        <form id="formLogin">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="loginPhone" placeholder="+91 98765 43210" autocomplete="tel" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Sign in</button>
        </form>
      </div>

      <div id="panelRegister" class="auth-panel">
        <form id="formRegister">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" id="regName" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="regPhone" placeholder="+91 98765 43210" required />
          </div>
          <div class="form-group">
            <label>Email (optional)</label>
            <input type="email" id="regEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password (min 6 characters)</label>
            <input type="password" id="regPassword" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Create account</button>
        </form>
      </div>

      <p class="hint">After seeding the database, demo login: phone <strong>+91 98765 43210</strong>, password <strong>pran123</strong>.</p>
      <a href="index.html" class="back-link">← Back to home</a>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/config.js"></script>
  <script src="js/auth-login.js"></script>
</body>
</html>
