<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pran — Incident Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/pran.css" />
  <style>
    body { background: var(--bg); overflow-x: hidden; }

    .summary-layout {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 120px;
    }

    /* Completion hero */
    .completion-hero {
      text-align: center;
      padding: 16px 0 28px;
    }
    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    .completion-hero h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .completion-hero p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Stats card */
    .stats-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .stats-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding-bottom: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .stat-item .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-item .stat-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
    }
    .stat-item .stat-value.dark { color: var(--text-primary); }

    .stats-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .detail-item .detail-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .detail-item .detail-icon-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .detail-item .detail-main { font-weight: 700; font-size: 14px; }
    .detail-item .detail-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Billing card */
    .billing-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .billing-card .billing-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .billing-header .bill-icon { font-size: 20px; }

    .billing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .billing-row:last-of-type { border-bottom: none; }
    .billing-row .row-label { color: var(--text-primary); }
    .billing-row .row-amount { font-weight: 600; }
    .billing-row.subtotal { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; }
    .billing-row.tax .row-label { color: var(--text-secondary); }
    .billing-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 0;
      border-top: 2px solid var(--border);
      margin-top: 4px;
    }
    .billing-total .total-label { font-weight: 800; font-size: 16px; }
    .billing-total .total-amount { font-weight: 800; font-size: 22px; color: var(--red); }
    .billing-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 12px;
    }

    /* Action grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .act-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .act-card:hover { border-color: var(--text-secondary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .act-card.yellow { border-color: #FCD34D; }
    .act-card.yellow:hover { border-color: var(--amber); }
    .act-card.teal { border-color: var(--teal); }
    .act-card.teal:hover { background: var(--teal-light); }

    .act-card .act-icon { font-size: 28px; }
    .act-card .act-label { font-weight: 700; font-size: 14px; }

    /* Pending state */
    .pending-overlay {
      text-align: center;
      padding: 60px 20px;
    }
    .pending-overlay .pending-icon { font-size: 48px; margin-bottom: 16px; }
    .pending-overlay h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .pending-overlay p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }

    /* Bottom nav */
    .fixed-bottom-nav {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-minimal" style="display:flex;align-items:center;padding:12px 24px">
    <a href="index.html" class="nav-logo" style="font-size:18px">
      <div class="logo-icon" style="width:28px;height:28px;font-size:14px">✚</div>
      Pran
    </a>
    <div style="margin-left:auto" class="nav-user">
      <span id="nav-username">Amrisha</span>
      <div class="nav-avatar" id="nav-avatar">A</div>
      <button class="nav-bell" style="margin-left:8px">🔔<span class="badge"></span></button>
    </div>
  </nav>

  <div class="summary-layout" id="summary-content">
    <!-- Content rendered by JS -->
    <div class="pending-overlay">
      <div class="pending-icon">⏳</div>
      <h2>Loading incident...</h2>
      <p>Fetching your incident data.</p>
      <div class="spinner" style="border-color:rgba(200,16,46,0.3);border-top-color:var(--red);margin:0 auto"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="fixed-bottom-nav">
    <div class="bottom-nav">
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9L12 2l9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Home
      </a>
      <a href="track.html" id="btn-track">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
        Track
      </a>
      <a href="share.html" id="btn-share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </a>
      <a href="summary.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M8 8h8M8 16h5"/></svg>
        Summary
      </a>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/summary.js"></script>
</body>
</html>
